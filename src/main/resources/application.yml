server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: ms-seguimiento
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/spsrt_seguimiento}
    username: ${DB_USER:spsrt_seguimiento_user}
    password: ${DB_PASSWORD:spsrt_seguimiento_pwd}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-handlers-package: pe.unir.tfm.srp.seguimiento.config
  configuration:
    map-underscore-to-camel-case: true
    default-statement-timeout: 30

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:cambiar-esta-clave-en-produccion-minimo-32-bytes-aleatorios}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
